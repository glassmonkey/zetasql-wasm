syntax = "proto3";

package test;

option go_package = "github.com/glassmonkey/zetasql-wasm/wasm/tools/example/generated/test";

// Simple test message
message Person {
  string name = 1;
  int32 age = 2;
  string email = 3;
}

// Test service
service GreetingService {
  rpc SayHello (Person) returns (Greeting);
}

message Greeting {
  string message = 1;
}
